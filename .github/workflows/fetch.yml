name: Fetch SSQ Data
on:
  schedule:
    - cron: '0 3,15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Delete existing files if they exist
        run: |
          rm -f 888.txt all.txt
          echo "Deleted existing files if any"

      - name: Run script
        run: |
          echo "=== Running Python script ==="
          python fetch_ssq.py 2>&1 || { echo "Script failed"; exit 1; }
          echo "=== Script completed ==="

      - name: Pull latest changes before commit
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          echo "=== Pulling latest changes ==="
          git pull origin ${{ github.ref_name }} --rebase

      - name: Show git status
        run: |
          echo "=== Git Status ==="
          git status
          echo "=== Git Diff ==="
          git diff

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Update SSQ data
          commit_user_name: GitHub Action
          commit_user_email: action@github.com